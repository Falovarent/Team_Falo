<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaloVerse</title>
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <img src="logo.png" alt="logo">
</div>

<!-- ===== HOME ===== -->
<section class="page active hero" id="home">
  <div>
    <h1>FALOVERSE</h1>
    <button class="btn" onclick="goTo('comics')">Enter The World</button>
  </div>
</section>

<!-- ===== COMICS ===== -->
<section class="page section" id="comics">
  <h2>Comics</h2>

  <div class="cards">
    <div class="card">
      <h3>Silent Kill</h3>
      <p>A dark story of power, death, and chaos...</p>
      <button class="btn" onclick="goTo('book')">Read More</button>
    </div>
  </div>

  <div class="nav">
    <button class="btn" onclick="goBack('home')">Before</button>
    <button class="btn" onclick="goTo('members')">Next</button>
  </div>
</section>

<!-- ===== BOOK ===== -->
<section class="page section" id="book">
  <h2>Silent Kill</h2>
  <p>ADD YOUR FULL DESCRIPTION HERE</p>

  <div class="nav">
    <button class="btn" onclick="goBack('comics')">Before</button>
    <button class="btn" onclick="goTo('members')">Next</button>
  </div>
</section>

<!-- ===== MEMBERS ===== -->
<section class="page section" id="members">
  <h2>Members</h2>

  <div class="cards">
    <div class="card">
      <h3>Member 1</h3>
      <p>Role / description</p>
    </div>

    <div class="card">
      <h3>Member 2</h3>
      <p>Role / description</p>
    </div>

    <div class="card">
      <h3>Member 3</h3>
      <p>Role / description</p>
    </div>
  </div>

  <div class="nav">
    <button class="btn" onclick="goBack('comics')">Before</button>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
