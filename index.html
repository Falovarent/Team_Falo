<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FALOVERSE</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <img src="logo.png" alt="logo">
</div>

<!-- ===== HOME ===== -->
<section class="page active" id="home">
  <div class="center">
    <h1>FALOVERSE</h1>
    <button class="btn" onclick="goTo('comics')">Enter The World</button>
  </div>
</section>

<!-- ===== COMICS ===== -->
<section class="page" id="comics">
  <div class="center">
    <h2>Comics</h2>

    <div class="card">
      <h3>Silent Kill</h3>
      <p>A dark story of power, death, and chaos...</p>
      <button class="btn" onclick="goBack('book')">Read More</button>
    </div>

    <div class="nav">
      <button class="btn" onclick="goBack('home')">Before</button>
      <button class="btn" onclick="goBack('members')">Next</button>
    </div>
  </div>
</section>

<!-- ===== BOOK ===== -->
<section class="page" id="book">
  <div class="center">
    <h2>Silent Kill</h2>
    <p>ADD YOUR FULL DESCRIPTION HERE</p>

    <div class="nav">
      <button class="btn" onclick="goBack('comics')">Before</button>
      <button class="btn" onclick="goBack('members')">Next</button>
    </div>
  </div>
</section>

<!-- ===== MEMBERS ===== -->
<section class="page" id="members">
  <div class="center">
    <h2>Members</h2>

    <div class="cards">
      <div class="card">
        <h3>Member 1</h3>
        <p>Role / description</p>
      </div>

      <div class="card">
        <h3>Member 2</h3>
        <p>Role / description</p>
      </div>

      <div class="card">
        <h3>Member 3</h3>
        <p>Role / description</p>
      </div>
    </div>

    <div class="nav">
      <button class="btn" onclick="goBack('comics')">Before</button>
    </div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
